<!DOCTYPE html>
<html lang="en">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PureVet Ordinacija - Početna</title>    
    <link rel="stylesheet" href="pr2.css">
</head>


<body>    
    <nav>
        <h1>PureVet</h1>
        <ul>
            <li><a href=".html">Početna</a></li>
            <li><a href="usluge2.html">Usluge</a></li>
            <li><a href="vreme.html">Radno Vreme</a></li>
            <li><a href="kontakt2.html">Kontakt</a></li>
        </ul>
    </nav>


    <main>       
        <header>
            <div class="overlay">
                <h2>Gde stručnost susreće ljubav prema životinjama.</h2>
                <p>Jer oni su porodica.</p>
                <button id="openForm">Posalji poruku</button>
            </div>
        </header>
    </main>


    <div id="modal" class="modal">
        <div class="modal-content">


            <span id="closeModal">&times;</span>


            <h2>Prijava</h2>


            <form>
                <input type="text" placeholder="Ime" required>
                <input type="email" placeholder="Email" required>
                <button type="submit">Pošalji</button>
            </form>


        </div>
    </div>


    <div id="sidebar" class="sidebar">


        <span id="closeSidebar">&times;</span>


        <h2>Prijava</h2>


        <form>
            <input type="text" placeholder="Ime" required>
            <input type="email" placeholder="Email" required>
            <button type="submit">Pošalji</button>
        </form>


    </div>


    <footer>
        <p>© 2026 PureVet Ordinacija</p>
    </footer>


    <script>
        const openBtn = document.getElementById("openForm");
        const sidebar = document.getElementById("sidebar");
        const closeBtn = document.getElementById("closeSidebar");


        // otvori sidebar
        openBtn.onclick = function () {
            sidebar.classList.add("active");
        }


        // zatvori sidebar
        closeBtn.onclick = function () {
            sidebar.classList.remove("active");
        }
    </script>
</body>


</html>
